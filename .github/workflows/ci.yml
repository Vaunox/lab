# CI. Deep dive P0 sections 5, 5.2, and 3.3.
#
# TWO JOBS, AND THE SPLIT IS LOAD-BEARING.
#
# Branch protection requires a status check named exactly `gate` (section 3.3,
# and the piped `gh api` response in HANDOFF.md records `contexts: ["gate"]`).
# A matrix job does NOT produce that context: GitHub names matrix checks
# `checks (ubuntu-latest)`, `checks (windows-latest)` and so on, so a single
# matrix job called `gate` yields three contexts and none of them is `gate`.
# `main` would then be permanently unmergeable, and the failure mode is the
# nasty one -- a completely green CI run that still blocks the merge, with
# nothing in the logs to explain it.
#
# So the matrix runs under `checks`, and a single non-matrix job named `gate`
# depends on it and reports the aggregate. That job is the required context.
#
# The matrix itself is not thoroughness for its own sake. The ledger lock is
# fcntl.flock on POSIX and msvcrt.locking on Windows (P1 section 6.3), and this
# is a library people will pip install. An untested lock on someone else's
# machine is a silently forked hash chain -- the exact failure the chain exists
# to make impossible, arriving down the one path nobody was watching.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # The attribution checker reads the FULL history, and the spec
          # isolation checker diffs against origin/main. A shallow clone makes
          # both of them silently weaker rather than loudly broken.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: gate
        run: python tools/gate.py

  gate:
    name: gate
    runs-on: ubuntu-latest
    needs: [checks]
    if: always()
    steps:
      - name: aggregate
        run: |
          echo "checks result: ${{ needs.checks.result }}"
          if [ "${{ needs.checks.result }}" != "success" ]; then
            echo "The OS matrix did not pass. This context is the one branch"
            echo "protection requires, and it fails closed: a skipped or"
            echo "cancelled matrix is not a passing matrix."
            exit 1
          fi
